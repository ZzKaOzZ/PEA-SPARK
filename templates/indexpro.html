<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<title>PEA SPARK</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans+Thai:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg:        #0b0f18;
  --surface:   #111827;
  --surface2:  #1a2235;
  --border:    #1e2d45;
  --text:      #e2e8f0;
  --muted:     #64748b;
  --accent:    #38bdf8;
  --green:     #22c55e;
  --red:       #ef4444;
  --yellow:    #f59e0b;
  --panel-w:   320px;
  --topbar-h:  70px; /* ปรับเพิ่มจาก 52px เป็น 70px เพื่อรองรับโลโก้ */
}

* { box-sizing: border-box; margin:0; padding:0; }
body { background: var(--bg); color: var(--text); font-family: 'IBM Plex Sans Thai', sans-serif; font-size: 13px; overflow: hidden; height: 100vh; }

#topbar {
  position: fixed; top: 0; left: 0; right: 0; height: var(--topbar-h);
  background: var(--surface); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 16px; z-index: 1000;
}

#brand { display: flex; align-items: center; gap: 15px; border-right: 1px solid var(--border); padding-right: 20px; min-width: 250px; }
/* ขยายขนาดโลโก้ที่นี่ */
#brand img { height: 55px; width: auto; object-fit: contain; border-radius: 6px; } 

.stat-pill { display: flex; align-items: center; gap: 10px; padding: 0 20px; border-right: 1px solid var(--border); height: 100%; }
.stat-pill .value { font-family: 'IBM Plex Mono', monospace; font-size: 18px; font-weight: 600; }
.btn { padding: 8px 16px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); cursor: pointer; }
.btn.primary { border-color: var(--accent); color: var(--accent); }

#map { position: fixed; top: var(--topbar-h); left: 0; right: var(--panel-w); bottom: 0; z-index: 1; }
#panel { position: fixed; top: var(--topbar-h); right: 0; width: var(--panel-w); bottom: 0; background: var(--surface); border-left: 1px solid var(--border); display: flex; flex-direction: column; z-index: 900; }

.tabs { display: flex; border-bottom: 1px solid var(--border); }
.tab { flex: 1; text-align: center; padding: 12px 0; cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent; }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
#panel-content { flex: 1; overflow-y: auto; }

#toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: var(--surface); border: 1px solid var(--border); padding: 8px 18px; border-radius: 20px; opacity: 0; transition: .25s; z-index: 2000; }
#toast.show { opacity: 1; }
</style>
</head>
<body>

<div id="topbar">
  <div id="brand">
    <img src="/static/555548.jpg" alt="PEA SPARK">
    <div class="title-block">
      <div class="main">PEA SPARK</div>
      <div class="sub">ENTERPRISE LIVE MODEL</div>
    </div>
  </div>
  <div class="stat-pill"><div><div class="label" style="font-size:10px;color:var(--muted)">Energized</div><div class="value" id="tb-energized" style="color:var(--green)">--%</div></div></div>
  <div class="stat-pill"><div><div class="label" style="font-size:10px;color:var(--muted)">Open Switches</div><div class="value" id="tb-switches" style="color:var(--accent)">-- / --</div></div></div>
  <div id="topbar-actions" style="margin-left:auto; display:flex; gap:10px;">
    <button class="btn" onclick="loadData()">🔄 Refresh</button>
    <button class="btn primary" onclick="toggleFaultMode()">⊕ Place fault</button>
    <button class="btn" style="border-color:var(--red);color:var(--red)" onclick="clearFault()">✕ Clear</button>
  </div>
</div>

<div id="map"></div>
<div id="panel">
  <div class="tabs">
    <div class="tab active" onclick="switchTab('switches')">Switches</div>
    <div class="tab" onclick="switchTab('status')">Status</div>
  </div>
  <div id="panel-content"></div>
</div>
<div id="toast"></div>

<script>
var map = L.map('map', { zoomControl: true, attributionControl: false }).setView([13.75, 100.5], 13);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

var lineLayer = L.geoJSON(null, {
  style: (f) => ({ color: f.properties.status === 'on' ? f.properties.color : '#334155', weight: 3, opacity: 0.8 })
}).addTo(map);

var switchLayer = L.layerGroup().addTo(map);
var faultMode = false;

async function loadData() {
  try {
    const [resL, resD, resS] = await Promise.all([ fetch('/api/conductor'), fetch('/api/dof'), fetch('/api/scada') ]);
    const lines = await resL.json();
    const devices = await resD.json();
    const scada = await resS.json();

    lineLayer.clearLayers().addData(lines);
    
    switchLayer.clearLayers();
    L.geoJSON(devices, {
      pointToLayer: (f, ll) => L.circleMarker(ll, { radius: 7, fillColor: f.properties.status ? '#22c55e' : '#ef4444', color: '#fff', weight: 2, fillOpacity: 1 }),
      onEachFeature: (f, l) => { l.bindPopup(`<b>ID: ${f.properties.id}</b><br><button onclick="toggleSwitch('${f.properties.id}')" style="margin-top:5px;cursor:pointer">Toggle</button>`); }
    }).addTo(switchLayer);

    document.getElementById('tb-energized').textContent = scada.energized_pct + '%';
    document.getElementById('tb-switches').textContent = scada.open_switches + ' / ' + scada.total_switches;
    
    // อัปเดตรายการใน Panel (Switch Tab)
    if(currentTab === 'switches') renderSwitchList(devices.features);
  } catch (e) { console.error(e); }
}

var currentTab = 'switches';
function switchTab(t) {
  currentTab = t;
  document.querySelectorAll('.tab').forEach(el => el.classList.toggle('active', el.textContent.toLowerCase() === t));
  loadData();
}

async function toggleSwitch(id) { await fetch('/toggle_switch?id=' + id); loadData(); }
function toggleFaultMode() { faultMode = !faultMode; document.body.style.cursor = faultMode ? 'crosshair' : 'default'; showToast(faultMode ? "Fault Mode ON" : "Fault Mode OFF"); }

map.on('click', async (e) => {
  if(!faultMode) return;
  const res = await fetch(`/fault?lat=${e.latlng.lat}&lon=${e.latlng.lng}`);
  const d = await res.json();
  showToast("Fault placed: " + d.feeder);
  faultMode = false;
  document.body.style.cursor = 'default';
  loadData();
});

async function clearFault() { await fetch('/clear_fault'); showToast("Fault cleared"); loadData(); }
function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3000); }

loadData();
</script>
</body>
</html>

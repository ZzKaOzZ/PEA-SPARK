<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<title>PEA SPARK - SYSTEM MONITORING</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans+Thai:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg:        #0b0f18;
  --surface:   #111827;
  --surface2:  #1a2235;
  --border:    #1e2d45;
  --text:      #e2e8f0;
  --muted:     #64748b;
  --accent:    #38bdf8;
  --green:     #22c55e;
  --red:       #ef4444;
  --yellow:    #f59e0b;
  --panel-w:   320px;
  --topbar-h:  70px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: 'IBM Plex Sans Thai', sans-serif; overflow: hidden; height: 100vh; }

/* ──────── TOP BAR ──────── */
#topbar {
  position: fixed; top: 0; left: 0; right: 0; height: var(--topbar-h);
  background: var(--surface); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 20px; z-index: 1000;
}

#brand { display: flex; align-items: center; gap: 15px; min-width: 300px; border-right: 1px solid var(--border); padding-right: 25px; }

/* ขยายขนาดโลโก้มุมซ้ายบน */
#brand img {
  height: 55px; /* ปรับขนาดให้ใหญ่ขึ้นตามต้องการ */
  width: auto;
  object-fit: contain;
}

.title-group .main { font-weight: 600; font-size: 18px; color: var(--accent); line-height: 1.2; }
.title-group .sub  { font-size: 11px; color: var(--muted); font-family: 'IBM Plex Mono', monospace; }

.stat-pill { display: flex; align-items: center; gap: 12px; padding: 0 20px; border-right: 1px solid var(--border); height: 100%; }
.stat-pill .label { font-size: 10px; color: var(--muted); text-transform: uppercase; }
.stat-pill .value { font-family: 'IBM Plex Mono', monospace; font-size: 18px; font-weight: 600; }

#topbar-actions { margin-left: auto; display: flex; gap: 10px; }
.btn { padding: 8px 16px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); cursor: pointer; font-weight: 500; font-size: 13px; }
.btn.primary { border-color: var(--accent); color: var(--accent); }

/* ──────── MAP & SIDEBAR ──────── */
#map { position: fixed; top: var(--topbar-h); left: 0; right: var(--panel-w); bottom: 0; z-index: 1; background: #0d1117; }

#panel { position: fixed; top: var(--topbar-h); right: 0; width: var(--panel-w); bottom: 0; background: var(--surface); border-left: 1px solid var(--border); z-index: 900; display: flex; flex-direction: column; }

.tabs { display: flex; border-bottom: 1px solid var(--border); }
.tab { flex: 1; text-align: center; padding: 15px 0; cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent; transition: 0.2s; }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); background: rgba(56,189,248,0.05); }

#search-wrap { padding: 15px; border-bottom: 1px solid var(--border); }
#search-input { width: 100%; padding: 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; color: var(--text); outline: none; }

#panel-content { flex: 1; overflow-y: auto; padding: 10px; }

/* Switch Item Card */
.sw-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; padding: 12px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: 0.2s; }
.sw-card:hover { border-color: var(--accent); }
.sw-status-dot { width: 8px; height: 8px; border-radius: 50%; }
.sw-id { font-family: 'IBM Plex Mono'; font-weight: 600; font-size: 14px; }

/* ──────── LEGEND ──────── */
#legend { position: fixed; bottom: 20px; left: 20px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 12px; z-index: 800; }
.legend-item { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; font-size: 12px; }
.dot { width: 10px; height: 10px; border-radius: 50%; }

#toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: var(--surface); border: 1px solid var(--accent); padding: 10px 25px; border-radius: 50px; display: none; z-index: 2000; }
</style>
</head>
<body>

<div id="topbar">
  <div id="brand">
    <img src="/static/logo.png" alt="PEA LOGO">
    <div class="title-group">
      <div class="main">PEA SPARK</div>
      <div class="sub">LIVE NETWORK MONITORING</div>
    </div>
  </div>

  <div class="stat-pill">
    <div>
      <div class="label">Energized</div>
      <div class="value" id="val-energized" style="color: var(--green);">--%</div>
    </div>
  </div>

  <div class="stat-pill">
    <div>
      <div class="label">Fault Feeder</div>
      <div class="value" id="val-fault" style="color: var(--red);">none</div>
    </div>
  </div>

  <div id="topbar-actions">
    <button class="btn" onclick="loadData()">🔄 Refresh</button>
    <button class="btn primary" onclick="toggleFaultMode()">⊕ Place Fault</button>
    <button class="btn" style="color: var(--red); border-color: var(--red);" onclick="clearFault()">✕ Clear</button>
  </div>
</div>

<div id="map"></div>

<div id="panel">
  <div class="tabs">
    <div class="tab active" onclick="switchTab('switches')">Switches</div>
    <div class="tab" onclick="switchTab('status')">System Status</div>
  </div>
  <div id="search-wrap">
    <input type="text" id="search-input" placeholder="ค้นหาอุปกรณ์..." onkeyup="filterList()">
  </div>
  <div id="panel-content"></div>
</div>

<div id="legend">
  <div style="font-size: 10px; color: var(--muted); margin-bottom: 8px;">LEGEND</div>
  <div class="legend-item"><div class="dot" style="background: var(--accent);"></div> Conductors</div>
  <div class="legend-item"><div class="dot" style="background: var(--green);"></div> Closed Switch</div>
  <div class="legend-item"><div class="dot" style="background: var(--red);"></div> Open Switch</div>
</div>

<div id="toast"></div>

<script>
var map = L.map('map', { zoomControl: false }).setView([13.75, 100.5], 13);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

var lineLayer = L.geoJSON(null, {
  style: function(f) {
    var on = f.properties.status === 'on';
    return { 
      color: on ? f.properties.color : '#2a3a52', 
      weight: on ? 2.5 : 1.5, 
      opacity: on ? 0.9 : 0.5 
    };
  }
}).addTo(map);

var switchLayer = L.layerGroup().addTo(map);
var firstLoad = true;
var currentTab = 'switches';
var faultMode = false;
var allDevices = [];

async function loadData() {
  try {
    const [resL, resD, resS] = await Promise.all([
      fetch('/api/conductor'),
      fetch('/api/dof'),
      fetch('/api/scada')
    ]);

    const lines = await resL.json();
    const devices = await resD.json();
    const scada = await resS.json();
    allDevices = devices.features;

    // วาดเส้น
    lineLayer.clearLayers().addData(lines);
    if (firstLoad && lines.features.length > 0) {
      map.fitBounds(lineLayer.getBounds());
      firstLoad = false;
    }

    // วาดอุปกรณ์
    switchLayer.clearLayers();
    L.geoJSON(devices, {
      pointToLayer: (f, ll) => L.circleMarker(ll, {
        radius: 7, fillColor: f.properties.status === 1 ? 'var(--green)' : 'var(--red)',
        color: '#fff', weight: 2, fillOpacity: 1
      }),
      onEachFeature: (f, l) => {
        l.bindPopup(`<b>ID: ${f.properties.id}</b><br>สถานะ: ${f.properties.status==1?'Closed':'Open'}<br><button onclick="toggleSwitch('${f.properties.id}')" style="margin-top:8px; width:100%; cursor:pointer;">Toggle</button>`);
      }
    }).addTo(switchLayer);

    // อัปเดต Stats
    document.getElementById('val-energized').textContent = scada.energized_pct + '%';
    document.getElementById('val-fault').textContent = scada.fault_feeder;
    
    renderList();
  } catch (e) { console.error(e); }
}

function renderList() {
  const content = document.getElementById('panel-content');
  if (currentTab === 'switches') {
    content.innerHTML = allDevices.map(f => `
      <div class="sw-card" onclick="map.setView([${f.geometry.coordinates[1]}, ${f.geometry.coordinates[0]}], 18)">
        <div class="sw-status-dot" style="background: ${f.properties.status==1?'var(--green)':'var(--red)'}"></div>
        <div class="sw-id">${f.properties.id}</div>
        <div style="margin-left: auto; font-size: 11px; color: var(--muted);">${f.properties.status==1?'CLOSED':'OPEN'}</div>
      </div>
    `).join('');
  } else {
    content.innerHTML = `<div style="padding: 20px; color: var(--muted); font-size: 13px;">กำลังคำนวณสถิติระบบ...</div>`;
  }
}

async function toggleSwitch(id) {
  await fetch(`/toggle_switch?id=${id}`);
  loadData();
}

function toggleFaultMode() {
  faultMode = !faultMode;
  document.body.style.cursor = faultMode ? 'crosshair' : 'default';
  showToast(faultMode ? "คลิกบนแผนที่เพื่อวาง Fault" : "ยกเลิกโหมด Fault");
}

map.on('click', async function(e) {
  if (!faultMode) return;
  const res = await fetch(`/fault?lat=${e.latlng.lat}&lon=${e.latlng.lng}`);
  const d = await res.json();
  showToast("Fault detected: " + d.feeder);
  faultMode = false;
  document.body.style.cursor = 'default';
  loadData();
});

async function clearFault() {
  await fetch('/clear_fault');
  loadData();
}

function showToast(m) {
  const t = document.getElementById('toast');
  t.textContent = m; t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 3000);
}

function switchTab(t) {
  currentTab = t;
  document.querySelectorAll('.tab').forEach(el => el.classList.toggle('active', el.textContent.toLowerCase().includes(t)));
  renderList();
}

loadData();
setInterval(loadData, 10000);
</script>
</body>
</html>

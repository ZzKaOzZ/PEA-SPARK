<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<title>PEA SARK</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans+Thai:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --bg:        #0b0f18;
  --surface:   #111827;
  --surface2:  #1a2235;
  --border:    #1e2d45;
  --text:      #e2e8f0;
  --muted:     #64748b;
  --accent:    #38bdf8;
  --green:     #22c55e;
  --red:       #ef4444;
  --yellow:    #f59e0b;
  --panel-w:   320px;
  --topbar-h:  52px;
}

* { box-sizing: border-box; margin:0; padding:0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'IBM Plex Sans Thai', sans-serif;
  font-size: 13px;
  overflow: hidden;
  height: 100vh;
}

/* ── TOP BAR ── */
#topbar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: var(--topbar-h);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 0;
  z-index: 1000;
  padding: 0 16px;
}

#brand {
  display: flex;
  align-items: center;
  gap: 10px;
  padding-right: 20px;
  border-right: 1px solid var(--border);
  min-width: 230px;
}

#brand .logo {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, #0ea5e9, #6366f1);
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
}

#brand .title-block .main { font-weight: 600; font-size: 14px; letter-spacing: .5px; }
#brand .title-block .sub  { font-size: 10px; color: var(--muted); font-family: 'IBM Plex Mono', monospace; }

.stat-pill {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 20px;
  border-right: 1px solid var(--border);
  height: 100%;
  cursor: default;
}

.stat-pill .icon { font-size: 15px; opacity: .7; }
.stat-pill .label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; line-height: 1; }
.stat-pill .value { font-family: 'IBM Plex Mono', monospace; font-size: 16px; font-weight: 600; line-height: 1; }
.stat-pill .value.ok    { color: var(--green); }
.stat-pill .value.warn  { color: var(--yellow); }
.stat-pill .value.error { color: var(--red); }
.stat-pill .value.info  { color: var(--accent); }

#topbar-actions {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 8px;
}

.btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 14px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--surface2);
  color: var(--text);
  font-size: 12px;
  font-family: 'IBM Plex Sans Thai', sans-serif;
  cursor: pointer;
  transition: all .15s;
}

.btn:hover { background: var(--border); }

.btn.primary {
  background: rgba(56,189,248,.15);
  border-color: var(--accent);
  color: var(--accent);
}

.btn.primary:hover { background: rgba(56,189,248,.25); }

.btn.danger {
  background: rgba(239,68,68,.12);
  border-color: var(--red);
  color: var(--red);
}

.btn.danger:hover  { background: rgba(239,68,68,.22); }

.btn.active-fault {
  animation: pulseBtn 1.4s ease-in-out infinite;
}

@keyframes pulseBtn {
  0%,100% { box-shadow: 0 0 0 0 rgba(239,68,68,.4); }
  50%      { box-shadow: 0 0 0 6px rgba(239,68,68,0); }
}

#refresh-btn { padding: 6px 10px; }

/* ── MAP ── */
#map {
  position: fixed;
  top: var(--topbar-h);
  left: 0;
  right: var(--panel-w);
  bottom: 0;
  z-index: 1;
}

/* dark tiles overlay */
#map::after {
  content: '';
  position: absolute; inset: 0;
  background: rgba(0,0,0,.35);
  pointer-events: none;
  z-index: 200;
}

/* ── FAULT CROSSHAIR ── */
.fault-marker {
  width: 18px; height: 18px;
  border: 2px solid var(--red);
  border-radius: 50%;
  background: rgba(239,68,68,.25);
  animation: pulse 1.2s ease-in-out infinite;
}

@keyframes pulse {
  0%,100% { box-shadow: 0 0 0 0 rgba(239,68,68,.6); }
  50%      { box-shadow: 0 0 0 10px rgba(239,68,68,0); }
}

/* ── RIGHT PANEL ── */
#panel {
  position: fixed;
  top: var(--topbar-h);
  right: 0;
  width: var(--panel-w);
  bottom: 0;
  background: var(--surface);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  z-index: 900;
}

/* tabs */
.tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.tab {
  flex: 1;
  text-align: center;
  padding: 12px 0;
  cursor: pointer;
  font-size: 12px;
  font-weight: 500;
  color: var(--muted);
  border-bottom: 2px solid transparent;
  transition: all .15s;
  letter-spacing: .5px;
}

.tab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

/* search */
#search-wrap {
  padding: 10px 12px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

#search {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 7px 10px;
  border-radius: 6px;
  font-size: 12px;
  font-family: 'IBM Plex Sans Thai', sans-serif;
  outline: none;
}

#search::placeholder { color: var(--muted); }
#search:focus { border-color: var(--accent); }

/* list */
#panel-content { flex: 1; overflow-y: auto; }

#panel-content::-webkit-scrollbar { width: 4px; }
#panel-content::-webkit-scrollbar-track { background: transparent; }
#panel-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* switch row */
.sw-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  transition: background .12s;
}

.sw-row:hover { background: var(--surface2); }

.sw-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

.sw-dot.closed { background: var(--green); box-shadow: 0 0 6px var(--green); }
.sw-dot.open   { background: var(--red);   box-shadow: 0 0 6px var(--red); }

.sw-info { flex: 1; overflow: hidden; }

.sw-id {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.sw-sub {
  font-size: 10px;
  color: var(--muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-top: 2px;
}

.sw-toggle {
  width: 38px; height: 20px;
  border-radius: 10px;
  background: var(--border);
  position: relative;
  flex-shrink: 0;
  transition: background .2s;
}

.sw-toggle.on  { background: rgba(34,197,94,.4); border: 1px solid var(--green); }
.sw-toggle.off { background: rgba(239,68,68,.2); border: 1px solid var(--red); }

.sw-toggle::after {
  content: '';
  position: absolute;
  top: 2px;
  width: 14px; height: 14px;
  border-radius: 50%;
  transition: all .2s;
}

.sw-toggle.on::after  { left: 21px; background: var(--green); }
.sw-toggle.off::after { left:  2px; background: var(--red); }

/* feeder tab */
.feeder-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
}

.feeder-swatch {
  width: 12px; height: 12px;
  border-radius: 3px;
  flex-shrink: 0;
}

.feeder-name {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 12px;
  font-weight: 600;
  flex: 1;
}

.feeder-bar-wrap { width: 70px; }

.feeder-bar-bg {
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}

.feeder-bar-fill {
  height: 100%;
  border-radius: 2px;
  transition: width .4s;
}

.feeder-pct {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  text-align: right;
  margin-top: 2px;
}

/* status tab */
.status-section { padding: 14px; }

.status-kv {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
}

.status-kv .k { color: var(--muted); }
.status-kv .v { font-family: 'IBM Plex Mono', monospace; font-weight: 600; }
.status-kv .v.green  { color: var(--green); }
.status-kv .v.red    { color: var(--red); }
.status-kv .v.yellow { color: var(--yellow); }
.status-kv .v.accent { color: var(--accent); }

/* ── LAYER CONTROL ── */
#layers {
  position: fixed;
  bottom: 20px;
  left: 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 14px;
  z-index: 800;
  min-width: 150px;
}

#layers .lyr-title {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.lyr-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 0;
  cursor: pointer;
  font-size: 12px;
}

.lyr-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  border: 2px solid;
  flex-shrink: 0;
}

.lyr-row.active .lyr-dot { background: currentColor; opacity: 1; }
.lyr-row:not(.active) .lyr-dot { opacity: .3; }

/* ── MAP CURSOR (fault mode) ── */
body.fault-mode #map { cursor: crosshair !important; }

/* ── LEAFLET overrides ── */
.leaflet-container { background: #080e18; }
.leaflet-control-attribution { display: none; }
.leaflet-control-zoom a {
  background: var(--surface) !important;
  color: var(--text) !important;
  border-color: var(--border) !important;
}

/* popup */
.leaflet-popup-content-wrapper {
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 8px;
  box-shadow: 0 8px 32px rgba(0,0,0,.6);
  font-family: 'IBM Plex Sans Thai', sans-serif;
  font-size: 12px;
}

.leaflet-popup-tip { background: var(--surface); }
.leaflet-popup-close-button { color: var(--muted) !important; }

.popup-id { font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:13px; margin-bottom:6px; }
.popup-row { display:flex; justify-content:space-between; gap:20px; padding:3px 0; }
.popup-row .pk { color:var(--muted); }
.popup-row .pv { font-weight:500; }
.popup-btn {
  width:100%; margin-top:10px;
  padding:6px; border-radius:6px;
  border:1px solid var(--border);
  background:var(--surface2); color:var(--text);
  cursor:pointer; font-size:12px;
  font-family:'IBM Plex Sans Thai',sans-serif;
  transition: background .15s;
}
.popup-btn:hover { background:var(--border); }
.popup-btn.open  { border-color:var(--red);   color:var(--red); }
.popup-btn.close { border-color:var(--green); color:var(--green); }

/* toast */
#toast {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px 18px;
  border-radius: 20px;
  font-size: 12px;
  opacity: 0;
  transition: all .25s;
  z-index: 2000;
  pointer-events: none;
}

#toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
</style>
</head>
<body>

<!-- ══════════════════════════ TOP BAR ══════════════════════════ -->
<div id="topbar">

  <div id="brand">
    <div class="logo">⚡</div>
    <div class="title-block">
      <div class="main">PEA SARK</div>
      <div class="sub">Provincial Electricity Authority · Live network model</div>
    </div>
  </div>

  <!-- ENERGIZED -->
  <div class="stat-pill">
    <div class="icon">📶</div>
    <div>
      <div class="label">Energized</div>
      <div class="value ok" id="tb-energized">--%</div>
    </div>
  </div>

  <!-- OPEN SWITCHES -->
  <div class="stat-pill">
    <div class="icon">⭕</div>
    <div>
      <div class="label">Open Switches</div>
      <div class="value info" id="tb-switches">-- / --</div>
    </div>
  </div>

  <!-- FAULT FEEDER -->
  <div class="stat-pill">
    <div class="icon">⚠️</div>
    <div>
      <div class="label">Fault Feeder</div>
      <div class="value error" id="tb-fault">none</div>
    </div>
  </div>

  <div id="topbar-actions">
    <button class="btn" id="refresh-btn" title="Refresh" onclick="loadData()">🔄</button>
    <button class="btn primary" id="place-fault-btn" onclick="toggleFaultMode()">⊕ Place fault</button>
    <button class="btn danger" id="clear-fault-btn" onclick="clearFault()">✕ Clear fault</button>
  </div>

</div>

<!-- ══════════════════════════ MAP ══════════════════════════ -->
<div id="map"></div>

<!-- ══════════════════════════ RIGHT PANEL ══════════════════════════ -->
<div id="panel">
  <div class="tabs">
    <div class="tab active" data-tab="switches" onclick="switchTab('switches')">Switches</div>
    <div class="tab"        data-tab="feeders"  onclick="switchTab('feeders')">Feeders</div>
    <div class="tab"        data-tab="status"   onclick="switchTab('status')">Status</div>
  </div>

  <div id="search-wrap">
    <input id="search" type="text" placeholder="Search switch id, feeder, location…" oninput="filterSwitches()">
  </div>

  <div id="panel-content"></div>
</div>

<!-- ══════════════════════════ LAYER CONTROL ══════════════════════════ -->
<div id="layers">
  <div class="lyr-title">⊞ Layers</div>
  <div class="lyr-row active" id="lyr-switches" onclick="toggleLayer('switches')" style="color:#22c55e;">
    <div class="lyr-dot" style="border-color:#22c55e;"></div> Switches
  </div>
  <div class="lyr-row active" id="lyr-reclosers" onclick="toggleLayer('reclosers')" style="color:#f59e0b;">
    <div class="lyr-dot" style="border-color:#f59e0b;"></div> Reclosers
  </div>
  <div class="lyr-row active" id="lyr-transformers" onclick="toggleLayer('transformers')" style="color:#f59e0b;">
    <div class="lyr-dot" style="border-color:#f59e0b;"></div> Transformers
  </div>
</div>

<div id="toast"></div>

<!-- ══════════════════════════ SCRIPT ══════════════════════════ -->
<script>
// ──────── MAP INIT ────────
var map = L.map('map', {
  zoomControl: true,
  attributionControl: false
}).setView([13.75, 100.5], 13);

L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
  maxZoom: 20
}).addTo(map);

var linesLayer   = L.geoJSON(null, { style: styleLines }).addTo(map);
var switchLayer  = L.geoJSON(null, { pointToLayer: makeSwitchMarker, onEachFeature: onEachSwitch }).addTo(map);

var faultMarker  = null;
var faultMode    = false;

// layer visibility
var layerVis = { switches: true, reclosers: true, transformers: true };

// all switches data cache
var allSwitches = [];
var currentTab  = 'switches';
var scadaData   = {};

// ──────── STYLE ────────
function styleLines(f) {
  var on = f.properties.status === "on";
  return {
    color:  on ? f.properties.color : "#2a3a52",
    weight: on ? 2.5 : 1.5,
    opacity: on ? 0.9 : 0.5
  };
}

function makeSwitchMarker(f, latlng) {
  var p = f.properties;
  var isOpen   = p.status === 0;
  var isRecloser = (p.type || '').toLowerCase() === 'recloser';

  var color = isOpen ? '#ef4444' : '#22c55e';
  var size  = isRecloser ? 10 : 8;

  var icon = L.divIcon({
    className: '',
    html: `<div style="
      width:${size}px; height:${size}px;
      border-radius:50%;
      background:${color};
      border: 2px solid rgba(255,255,255,.35);
      box-shadow: 0 0 ${isOpen?8:5}px ${color};
    "></div>`,
    iconSize:   [size, size],
    iconAnchor: [size/2, size/2]
  });

  return L.marker(latlng, { icon });
}

function onEachSwitch(f, layer) {
  var p = f.properties;
  layer.on('click', function(e) {
    L.DomEvent.stopPropagation(e);
    showSwitchPopup(f, layer);
  });
}

function showSwitchPopup(f, layer) {
  var p = f.properties;
  var isOpen = p.status === 0;
  var html = `
    <div class="popup-id">${p.id}</div>
    <div class="popup-row"><span class="pk">Feeder</span><span class="pv">${p.feeder||'UNK'}</span></div>
    <div class="popup-row"><span class="pk">Type</span><span class="pv">${p.type||'Disconnect'}</span></div>
    <div class="popup-row"><span class="pk">Location</span><span class="pv">${p.location||'-'}</span></div>
    <div class="popup-row">
      <span class="pk">State</span>
      <span class="pv" style="color:${isOpen?'#ef4444':'#22c55e'}">${isOpen?'OPEN':'CLOSE'}</span>
    </div>
    <button class="popup-btn ${isOpen?'close':'open'}" onclick="toggleSwitch('${p.id}')">
      ${isOpen ? '⊕ Close switch' : '⊖ Open switch'}
    </button>
  `;
  layer.bindPopup(html, { maxWidth: 240 }).openPopup();
}

// ──────── TOGGLE SWITCH ────────
function toggleSwitch(id) {
  fetch('/toggle_switch?id=' + id)
    .then(() => { loadData(); showToast('Switch ' + id + ' toggled'); });
}

// ──────── FAULT MODE ────────
function toggleFaultMode() {
  faultMode = !faultMode;
  document.body.classList.toggle('fault-mode', faultMode);
  var btn = document.getElementById('place-fault-btn');
  btn.textContent = faultMode ? '✕ Cancel fault' : '⊕ Place fault';
  btn.classList.toggle('danger', faultMode);
  btn.classList.toggle('primary', !faultMode);
  if (faultMode) showToast('Click on map to place fault');
}

function clearFault() {
  fetch('/clear_fault').then(() => {
    if (faultMarker) { map.removeLayer(faultMarker); faultMarker = null; }
    faultMode = false;
    document.body.classList.remove('fault-mode');
    var btn = document.getElementById('place-fault-btn');
    btn.textContent = '⊕ Place fault';
    btn.classList.remove('danger');
    btn.classList.add('primary');
    loadData();
    showToast('Fault cleared');
  });
}

map.on('click', function(e) {
  if (!faultMode) return;
  var lat = e.latlng.lat, lon = e.latlng.lng;

  fetch('/fault?lat=' + lat + '&lon=' + lon).then(r => r.json()).then(d => {
    if (faultMarker) map.removeLayer(faultMarker);
    faultMarker = L.marker([lat, lon], {
      icon: L.divIcon({
        className: '',
        html: '<div class="fault-marker"></div>',
        iconSize: [18,18], iconAnchor: [9,9]
      }),
      zIndexOffset: 1000
    }).addTo(map).bindPopup(`<b>⚠ Fault</b><br>Feeder: ${d.feeder}`).openPopup();

    faultMode = false;
    document.body.classList.remove('fault-mode');
    var btn = document.getElementById('place-fault-btn');
    btn.textContent = '⊕ Place fault';
    btn.classList.remove('danger');
    btn.classList.add('primary');

    loadData();
    showToast('Fault placed on feeder ' + d.feeder, true);
  });
});

// ──────── LAYER TOGGLE ────────
function toggleLayer(name) {
  layerVis[name] = !layerVis[name];
  var el = document.getElementById('lyr-' + name);
  el.classList.toggle('active', layerVis[name]);
  renderSwitchLayer();
}

// ──────── DATA LOAD ────────
function loadData() {
  // conductor
  fetch('/api/conductor').then(r => r.json()).then(d => {
    linesLayer.clearLayers();
    linesLayer.addData(d);
    linesLayer.setStyle(styleLines);
  });

  // switches + dof
  fetch('/api/dof').then(r => r.json()).then(d => {
    allSwitches = d.features || [];
    renderSwitchLayer();
    renderPanel();
  });

  // scada
  fetch('/api/scada').then(r => r.json()).then(d => {
    scadaData = d;
    updateTopBar(d);
    if (currentTab === 'feeders') renderFeeders(d);
    if (currentTab === 'status')  renderStatus(d);
  });
}

// ──────── SWITCH LAYER RENDER ────────
function renderSwitchLayer() {
  switchLayer.clearLayers();

  var visible = allSwitches.filter(f => {
    var t = (f.properties.type || '').toLowerCase();
    if (t === 'recloser'  && !layerVis.reclosers)    return false;
    if (t !== 'recloser'  && !layerVis.switches)     return false;
    return true;
  });

  var fc = { type: 'FeatureCollection', features: visible };
  switchLayer.addData(fc);
  switchLayer.eachLayer(l => {
    l.on('click', e => { L.DomEvent.stopPropagation(e); showSwitchPopup(l.feature, l); });
  });
}

// ──────── TOP BAR ────────
function updateTopBar(d) {
  var epct = d.energized_pct || 0;
  var el = document.getElementById('tb-energized');
  el.textContent = epct + '%';
  el.className = 'value ' + (epct >= 90 ? 'ok' : epct >= 70 ? 'warn' : 'error');

  document.getElementById('tb-switches').textContent =
    (d.open_switches || 0) + ' / ' + (d.total_switches || 0);

  var faultEl = document.getElementById('tb-fault');
  var fault = d.fault_feeder;
  faultEl.textContent = fault || 'none';
  faultEl.className = 'value ' + (fault ? 'error active-fault' : 'ok');
}

// ──────── TABS ────────
function switchTab(name) {
  currentTab = name;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
  document.getElementById('search-wrap').style.display = name === 'switches' ? '' : 'none';
  renderPanel();
}

function renderPanel() {
  if (currentTab === 'switches') renderSwitches();
  if (currentTab === 'feeders')  renderFeeders(scadaData);
  if (currentTab === 'status')   renderStatus(scadaData);
}

// ──────── SWITCHES LIST ────────
function filterSwitches() { renderSwitches(); }

function renderSwitches() {
  var q = document.getElementById('search').value.toLowerCase();
  var content = document.getElementById('panel-content');

  var items = allSwitches.filter(f => {
    var p = f.properties;
    if (!q) return true;
    return (p.id||'').toLowerCase().includes(q)
        || (p.feeder||'').toLowerCase().includes(q)
        || (p.location||'').toLowerCase().includes(q)
        || (p.type||'').toLowerCase().includes(q);
  });

  content.innerHTML = items.map(f => {
    var p = f.properties;
    var isOpen = p.status === 0;
    return `
      <div class="sw-row" onclick="flyToSwitch(${JSON.stringify(f.geometry.coordinates)}, '${p.id}')">
        <div class="sw-dot ${isOpen ? 'open' : 'closed'}"></div>
        <div class="sw-info">
          <div class="sw-id">${p.id}</div>
          <div class="sw-sub">${p.feeder||'UNK'} · ${p.type||'Disconnect'} · ${p.location||'-'}</div>
        </div>
        <div class="sw-toggle ${isOpen ? 'off' : 'on'}"></div>
      </div>
    `;
  }).join('');
}

function flyToSwitch(coords, id) {
  map.flyTo([coords[1], coords[0]], 16, { duration: 0.8 });
}

// ──────── FEEDERS ────────
function renderFeeders(d) {
  var content = document.getElementById('panel-content');
  var feeders = d.feeders || {};

  if (!Object.keys(feeders).length) {
    content.innerHTML = '<div style="padding:20px;color:var(--muted);text-align:center">Loading feeders…</div>';
    return;
  }

  content.innerHTML = Object.entries(feeders)
    .sort((a,b) => b[1].pct - a[1].pct)
    .map(([id, fd]) => `
      <div class="feeder-row">
        <div class="feeder-swatch" style="background:${fd.color}"></div>
        <div class="feeder-name">${id}</div>
        <div class="feeder-bar-wrap">
          <div class="feeder-bar-bg">
            <div class="feeder-bar-fill" style="width:${fd.pct}%;background:${fd.color}"></div>
          </div>
          <div class="feeder-pct">${fd.pct}%</div>
        </div>
      </div>
    `).join('');
}

// ──────── STATUS ────────
function renderStatus(d) {
  var content = document.getElementById('panel-content');
  if (!Object.keys(d).length) {
    content.innerHTML = '<div style="padding:20px;color:var(--muted);text-align:center">Loading…</div>';
    return;
  }

  var faultColor = d.fault_feeder ? 'red' : 'green';
  var epct = d.energized_pct || 0;
  var epctColor = epct >= 90 ? 'green' : epct >= 70 ? 'yellow' : 'red';

  content.innerHTML = `
    <div class="status-section">
      <div class="status-kv">
        <span class="k">Energized nodes</span>
        <span class="v accent">${d.nodes_on || 0} / ${(d.nodes_on||0)+(d.nodes_off||0)}</span>
      </div>
      <div class="status-kv">
        <span class="k">Energized %</span>
        <span class="v ${epctColor}">${epct}%</span>
      </div>
      <div class="status-kv">
        <span class="k">De-energized nodes</span>
        <span class="v red">${d.nodes_off || 0}</span>
      </div>
      <div class="status-kv">
        <span class="k">Open switches</span>
        <span class="v yellow">${d.open_switches || 0}</span>
      </div>
      <div class="status-kv">
        <span class="k">Total switches</span>
        <span class="v accent">${d.total_switches || 0}</span>
      </div>
      <div class="status-kv">
        <span class="k">Fault feeder</span>
        <span class="v ${faultColor}">${d.fault_feeder || 'none'}</span>
      </div>
    </div>
  `;
}

// ──────── TOAST ────────
function showToast(msg, warn) {
  var t = document.getElementById('toast');
  t.textContent = (warn ? '⚠ ' : '✓ ') + msg;
  t.style.borderColor = warn ? 'var(--red)' : 'var(--green)';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ──────── INIT ────────
switchTab('switches');
loadData();
setInterval(loadData, 5000);
</script>
</body>
</html>

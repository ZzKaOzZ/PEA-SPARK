<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>PEA SPARK DMS</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body { margin:0; background:#0b1220; color:white; font-family:sans-serif;}

#map {
    position:absolute;
    top:0;
    left:300px;
    right:0;
    bottom:0;
}

.panel {
    position:absolute;
    left:0;
    top:0;
    width:300px;
    height:100%;
    background:#0f1a2e;
    padding:15px;
}

h2 { margin-top:0; }

.card {
    margin-bottom:15px;
    padding:10px;
    background:#16243a;
    border-radius:6px;
}

button {
    width:100%;
    padding:8px;
    margin-top:5px;
    background:#1e88e5;
    border:none;
    color:white;
}
</style>
</head>

<body>

<div class="panel">
<h2>⚡ GRID STATUS</h2>

<div class="card">
<div id="fault">Fault: -</div>
<div id="online">Online: -</div>
<div id="offline">Offline: -</div>
<div id="switch">Switch Open: -</div>
</div>

<button onclick="getPlan()">Suggest Switching</button>
<div id="plan"></div>

</div>

<div id="map"></div>

<script>
var map = L.map('map').setView([13.75,100.5],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

var linesLayer = L.geoJSON(null, {
    style: function(f){
        return {
            color: f.properties.status==="on"?f.properties.color:"#555",
            weight:3
        }
    }
}).addTo(map);

var switchLayer = L.geoJSON(null, {
    pointToLayer: function(f, latlng){
        return L.circleMarker(latlng,{
            radius:6,
            color: f.properties.status==1?"#00e5ff":"#ff5252",
            fillOpacity:1
        });
    }
}).addTo(map);

// =========================
function loadData(){

// 🔹 สายไฟ
fetch('/api/conductor')
.then(r=>r.json())
.then(d=>{
    linesLayer.clearLayers();
    linesLayer.addData(d);
});

// 🔹 switch
fetch('/api/dof')
.then(r=>r.json())
.then(d=>{
    switchLayer.clearLayers();
    switchLayer.addData(d);

    switchLayer.eachLayer(l=>{
        l.on('click',()=>{
            fetch('/toggle_switch?id='+l.feature.properties.id)
            .then(()=>loadData());
        });
    });
});

// 🔹 SCADA UI (สำคัญ!)
fetch('/api/scada')
.then(r=>r.json())
.then(d=>{
    document.getElementById('fault').innerHTML = "Fault: " + (d.fault_feeder || "-");
    document.getElementById('online').innerHTML = "Online: " + d.nodes_on;
    document.getElementById('offline').innerHTML = "Offline: " + d.nodes_off;
    document.getElementById('switch').innerHTML = "Switch Open: " + d.switch_open;
});

}

// =========================
// click map = fault
map.on('click', function(e){
    fetch(`/fault?lat=${e.latlng.lat}&lon=${e.latlng.lng}`)
    .then(()=>loadData());
});

// =========================
// switching plan (placeholder)
function getPlan(){
    document.getElementById('plan').innerHTML = "กำลังพัฒนา...";
}

// =========================
setInterval(loadData,2000);
loadData();

</script>

</body>
</html>
